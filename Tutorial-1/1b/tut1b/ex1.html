<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Exercise 1 - HTML Table</title>

    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        th {
            background-color: #1c87c9;
            color: white;
            border: 1px solid black;
            padding: 10px;
        }

        td {
            border: 1px solid black;
            padding: 8px;
        }
    </style>

</head>

<body>

    <h2>Exercise 1</h2>

    <table>

        <tr>
            <th>Heading</th>
            <th>Heading</th>
        </tr>

        <tr>
            <td>HTML Tables</td>
            <td>Introduction</td>
        </tr>

        <tr>
            <td>CSS Styling</td>
            <td>Formatting Tables</td>
        </tr>

        <tr>
            <td>Forms</td>
            <td>User Input</td>
        </tr>

        <tr>
            <td>Media</td>
            <td>Audio & Video</td>
        </tr>

    </table>

</body>

</html>
